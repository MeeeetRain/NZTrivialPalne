<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f3a5f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="NZ 时间轴" />
<title>新西兰 12 天时间轴</title>
<style>
:root {
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --soft: #9ca3af;
  --primary: #0f3a5f;
  --primary-2: #1e6091;
  --primary-light: #eef4f9;
  --primary-soft: #f0f6fc;
  --accent: #b03a2e;
  --warm: #fbbf24;
  --border: #e5e7eb;
  --border-soft: #f3f4f6;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
  --hour-h: 52px;
  --col-w: 220px;
  --col-w-mobile: 160px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: rgba(30,96,145,0.15); }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* ===== Header ===== */
.topbar {
  position: sticky;
  top: 0;
  height: 56px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  padding-left: max(18px, env(safe-area-inset-left));
  padding-right: max(18px, env(safe-area-inset-right));
  z-index: 100;
  gap: 14px;
}
.topbar-title {
  font-weight: 700;
  font-size: 15px;
  color: var(--primary);
  flex: 1;
}
.topbar-nav { display: flex; gap: 6px; align-items: center; }
.topbar-link {
  font-size: 12.5px;
  color: var(--primary-2);
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: white;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.topbar-link:hover { background: var(--primary-light); border-color: var(--primary-2); }
@media (max-width: 480px) {
  .topbar-link { padding: 5px 8px; font-size: 11.5px; }
}

/* PDF link button inside detail-event-text */
.detail-event-doc {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--primary-light);
  color: var(--primary) !important;
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-decoration: none;
  margin-top: 4px;
  margin-right: 4px;
  border: 1px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.detail-event-doc:hover {
  background: var(--primary-2);
  color: white !important;
}

/* ===== Layout ===== */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: calc(100vh - 56px);
}

/* ===== Detail Panel (left) ===== */
.detail-panel {
  background: var(--card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 24px;
}
.detail-empty {
  color: var(--muted);
  text-align: center;
  padding-top: 80px;
  font-size: 14px;
}
.detail-empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.5; }

.detail-head {
  margin-bottom: 18px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-soft);
}
.detail-day-num {
  display: inline-block;
  background: var(--primary);
  color: white;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 8px;
  font-size: 13px;
  letter-spacing: 0.5px;
}
.detail-date {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  margin: 8px 0 4px 0;
}
.detail-subtitle {
  font-size: 14px;
  color: var(--muted);
}
.detail-tag {
  display: inline-block;
  background: var(--primary-light);
  color: var(--primary-2);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  margin-top: 8px;
  margin-right: 4px;
}

.detail-events { margin-top: 16px; }
.detail-event {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.detail-event:last-child { border-bottom: none; }
.detail-event-time {
  flex-shrink: 0;
  width: 60px;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-2);
  padding-top: 2px;
}
.detail-event-icon { flex-shrink: 0; font-size: 18px; padding-top: 2px; }
.detail-event-text {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  line-height: 1.55;
}
.detail-event-note {
  font-size: 12.5px;
  color: var(--muted);
  margin-top: 3px;
}

.detail-notes {
  margin-top: 18px;
  padding: 12px 14px;
  background: #fffbeb;
  border-left: 3px solid var(--warm);
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  color: #5b3a00;
}
.detail-notes-title { font-weight: 600; margin-bottom: 4px; }

/* ===== Timeline (right) ===== */
.timeline-wrap {
  overflow: auto;
  background: var(--bg);
  position: relative;
  -webkit-overflow-scrolling: touch;
}
.timeline {
  display: grid;
  grid-template-columns: 50px repeat(12, var(--col-w));
  min-width: max-content;
  position: relative;
}

/* Hour gutter */
.hour-gutter {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--bg);
  border-right: 1px solid var(--border);
}
.hour-cell {
  height: var(--hour-h);
  font-size: 10px;
  color: var(--soft);
  padding: 4px 6px 0 0;
  text-align: right;
  border-bottom: 1px dashed var(--border-soft);
}
.gutter-header {
  height: 78px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 11;
  border-bottom: 1px solid var(--border);
}

/* Day column */
.day-col {
  border-right: 1px solid var(--border-soft);
  position: relative;
  cursor: pointer;
  transition: background 0.15s;
}
.day-col:hover { background: rgba(30,96,145,0.03); }
.day-col.active {
  background: rgba(30,96,145,0.06);
}
.day-col.active .day-header {
  background: linear-gradient(180deg, var(--primary) 0%, var(--primary-2) 100%);
  color: white;
}
.day-col.active .day-num { background: rgba(255,255,255,0.2); color: white; }
.day-col.active .day-weekday { color: rgba(255,255,255,0.85); }

.day-header {
  position: sticky;
  top: 0;
  z-index: 9;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  text-align: center;
  height: 78px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  transition: background 0.2s, color 0.2s;
}
.day-num {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  background: var(--primary-light);
  color: var(--primary);
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
  margin: 0 auto;
  transition: background 0.2s, color 0.2s;
}
.day-date { font-size: 15px; font-weight: 700; }
.day-weekday { font-size: 11px; color: var(--muted); transition: color 0.2s; }

.day-body { position: relative; }

/* Hour grid */
.hour-grid-line {
  border-bottom: 1px dashed var(--border-soft);
  height: var(--hour-h);
}

/* Event chip */
.event-chip {
  position: absolute;
  left: 6px;
  right: 6px;
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--primary-2);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 11.5px;
  line-height: 1.35;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  overflow: hidden;
  transition: transform 0.12s, box-shadow 0.12s;
}
.event-chip:hover {
  transform: translateX(1px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  z-index: 5;
}
.event-chip-time {
  font-weight: 700;
  color: var(--primary-2);
  font-size: 10.5px;
  margin-right: 4px;
}
.event-chip-icon { margin-right: 3px; }
.event-chip.flight { border-left-color: #0a84ff; background: #f0f7ff; }
.event-chip.drive { border-left-color: #34c759; background: #f0fdf4; }
.event-chip.food { border-left-color: #ff9500; background: #fff7ed; }
.event-chip.hotel { border-left-color: #af52de; background: #faf5ff; }
.event-chip.ski { border-left-color: #5ac8fa; background: #f0f9ff; }
.event-chip.spa { border-left-color: #ff375f; background: #fff1f3; }
.event-chip.tour { border-left-color: #ffcc00; background: #fffbeb; }
.event-chip.transit { border-left-color: var(--soft); background: #fafafa; }

/* Empty filler */
.day-col-filler {
  position: relative;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 6px,
    rgba(0,0,0,0.015) 6px,
    rgba(0,0,0,0.015) 12px
  );
}

/* Day type tags */
.day-tag {
  position: absolute;
  top: 4px;
  right: 6px;
  background: var(--warm);
  color: #5b3a00;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  z-index: 8;
}

/* ===== Mobile ===== */
@media (max-width: 900px) {
  :root { --col-w: var(--col-w-mobile); }
  .layout {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }
  .detail-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 45vh;
    padding: 18px;
  }
  .topbar-title { font-size: 14px; }
}
@media (max-width: 480px) {
  .detail-date { font-size: 18px; }
  .detail-event-time { width: 52px; font-size: 11px; }
  .detail-event-text { font-size: 13px; }
  .topbar { height: 52px; padding: 0 14px; }
}
</style>
</head>

// ====== Render Timeline ======
const timeline = document.getElementById('timeline');
const detailPanel = document.getElementById('detail-panel');
const detailEmpty = document.getElementById('detail-empty');
const detailContent = document.getElementById('detail-content');

// Hour gutter
const gutter = document.createElement('div');
gutter.className = 'hour-gutter';
const gutterHeader = document.createElement('div');
gutterHeader.className = 'gutter-header';
gutter.appendChild(gutterHeader);
for (let h = HOUR_START; h <= HOUR_END; h++) {
  const cell = document.createElement('div');
  cell.className = 'hour-cell';
  cell.textContent = h < 24 ? (h.toString().padStart(2, '0') + ':00') : '00:00';
  gutter.appendChild(cell);
}
timeline.appendChild(gutter);

// Day columns
days.forEach(day => {
  const col = document.createElement('div');
  col.className = 'day-col';
  col.dataset.dayId = day.id;

  // Header
  const head = document.createElement('div');
  head.className = 'day-header';
  head.innerHTML = `
    <span class="day-num">D${day.id}</span>
    <div class="day-date">${day.date}</div>
    <div class="day-weekday">${day.weekday}</div>
  `;
  col.appendChild(head);

  // Body
  const body = document.createElement('div');
  body.className = 'day-body';
  body.style.position = 'relative';
  body.style.height = (HOUR_END - HOUR_START + 1) * HOUR_HEIGHT + 'px';

  // Day type tag
  if (day.tag) {
    const tag = document.createElement('div');
    tag.className = 'day-tag';
    tag.textContent = day.tag;
    body.appendChild(tag);
  }

  // Hour grid lines
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    const line = document.createElement('div');
    line.className = 'hour-grid-line';
    body.appendChild(line);
  }

  // Events
  day.events.forEach(ev => {
    const top = (ev.hour - HOUR_START) * HOUR_HEIGHT;
    const chip = document.createElement('div');
    chip.className = 'event-chip ' + (ev.type || '');
    chip.style.top = top + 'px';
    chip.innerHTML = `
      <span class="event-chip-time">${ev.time}</span>
      <span class="event-chip-icon">${ev.icon}</span>${ev.text}
    `;
    body.appendChild(chip);
  });

  col.appendChild(body);

  col.addEventListener('click', () => selectDay(day.id));
  timeline.appendChild(col);
});

// ====== Detail Panel ======
function selectDay(id) {
  document.querySelectorAll('.day-col').forEach(c => c.classList.remove('active'));
  const col = document.querySelector(`.day-col[data-day-id="${id}"]`);
  if (col) col.classList.add('active');

  const day = days.find(d => d.id === id);
  if (!day) return;

  detailEmpty.style.display = 'none';
  detailContent.style.display = 'block';

  detailContent.innerHTML = `
    <div class="detail-head">
      <span class="detail-day-num">D${day.id}</span>
      <div class="detail-date">${day.date} ${day.weekday}</div>
      <div class="detail-subtitle">${day.subtitle}</div>
      <div>${day.tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="detail-events">
      ${day.events.map(ev => `
        <div class="detail-event">
          <div class="detail-event-time">${ev.time}</div>
          <div class="detail-event-icon">${ev.icon}</div>
          <div class="detail-event-text">
            ${ev.text}
            ${ev.note ? `<div class="detail-event-note">${ev.note}</div>` : ''}
            ${ev.docs ? `<div>${ev.docs.map(d => `<a class="detail-event-doc" href="${d.url}" target="_blank">${d.label}</a>`).join('')}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
    ${day.notes ? `<div class="detail-notes">
      <div class="detail-notes-title">💡 注意</div>
      ${day.notes}
    </div>` : ''}
  `;
  detailPanel.scrollTop = 0;
}

// Default: select D1
selectDay(1);
// Scroll timeline so it shows from start
document.getElementById('timeline-wrap').scrollLeft = 0;
