<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 解锁私密文件 - 新西兰旅行</title>
<style>
:root {
  --bg: #f6f7f9;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --primary: #0f3a5f;
  --primary-2: #1e6091;
  --primary-light: #eef4f9;
  --error: #b91c1c;
  --success: #15803d;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: linear-gradient(135deg, #0f3a5f 0%, #1e6091 100%);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--card);
  padding: 32px 28px;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  max-width: 420px;
  width: 100%;
}
h1 {
  margin: 0 0 6px 0;
  font-size: 22px;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 22px;
  line-height: 1.55;
}
.field {
  margin-bottom: 14px;
}
label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 6px;
}
input[type="password"], input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid #d1d5db;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  transition: border-color 0.15s;
}
input:focus {
  outline: none;
  border-color: var(--primary-2);
}
button {
  width: 100%;
  padding: 12px 14px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
button:hover { background: var(--primary-2); }
button:disabled {
  background: var(--muted);
  cursor: not-allowed;
}
.msg {
  margin-top: 12px;
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 6px;
  display: none;
}
.msg.error {
  background: #fef2f2;
  color: var(--error);
  border-left: 3px solid var(--error);
  display: block;
}
.msg.success {
  background: #f0fdf4;
  color: var(--success);
  border-left: 3px solid var(--success);
  display: block;
}
.show-toggle {
  font-size: 12px;
  color: var(--primary-2);
  cursor: pointer;
  margin-top: 6px;
  display: inline-block;
}
.alt-link {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid #e5e7eb;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.alt-link a {
  color: var(--primary-2);
  text-decoration: none;
}
.alt-link a:hover { text-decoration: underline; }
.warn {
  font-size: 11px;
  color: var(--muted);
  margin-top: 18px;
  padding: 8px 10px;
  background: #fffbeb;
  border-left: 3px solid #fbbf24;
  border-radius: 0 4px 4px 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 解锁私密文件</h1>
  <p class="subtitle">输入密码访问含 PNR、订单号、护照、酒店确认号等敏感信息的完整版。</p>

  <form id="unlock-form">
    <div class="field">
      <label for="password">密码</label>
      <input type="password" id="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required>
      <span class="show-toggle" id="toggle-show">显示</span>
    </div>
    <button type="submit" id="submit-btn">解锁并进入</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="alt-link">
    或使用邮箱 OTP 验证（推荐）：<a href="private/">点这里 →</a><br/>
    返回公开版：<a href="plan.html">完整计划 →</a> · <a href="timeline.html">时间轴 →</a>
  </div>

  <div class="warn">
    ⚠️ 密码门是便利入口，不是严格安全屏障。真正的隐私保护由 Cloudflare Access 邮箱验证提供。
  </div>
</div>

<script>
// SHA-256 hash of the password (computed offline)
const TARGET_HASH = '33d385e7bd0082b729d0d8622bb6771fbc2e513393f2f73289b16ebc284698a9';
// Session flag key — shared with timeline.html and plan-full.html
const SESSION_KEY = 'nz_from_private';

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

const form = document.getElementById('unlock-form');
const input = document.getElementById('password');
const msg = document.getElementById('msg');
const btn = document.getElementById('submit-btn');
const toggle = document.getElementById('toggle-show');

toggle.addEventListener('click', () => {
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '隐藏';
  } else {
    input.type = 'password';
    toggle.textContent = '显示';
  }
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = '验证中…';
  msg.className = 'msg';
  msg.textContent = '';

  const pwd = input.value;
  try {
    const hash = await sha256(pwd);
    if (hash === TARGET_HASH) {
      try { sessionStorage.setItem(SESSION_KEY, '1'); } catch (e) {}
      msg.className = 'msg success';
      msg.textContent = '✓ 密码正确，正在进入…';
      setTimeout(() => {
        window.location.href = 'private/plan-full.html';
      }, 400);
    } else {
      msg.className = 'msg error';
      msg.textContent = '✗ 密码错误，请重试';
      btn.disabled = false;
      btn.textContent = '解锁并进入';
      input.select();
    }
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = '浏览器不支持加密 API，请用 OTP 入口';
    btn.disabled = false;
    btn.textContent = '解锁并进入';
  }
});

// Auto-focus on load
input.focus();
</script>
</body>
</html>
